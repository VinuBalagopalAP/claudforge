name: Bug Report
description: File a report to help us improve
title: "[BUG] <title>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using? (e.g. macOS, Windows, Linux)
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: What version of Python are you using? (e.g. 3.9.12)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How did you encounter the bug?
      placeholder: |
        1. Run `claudforge upload ...`
        2. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please provide any terminal output or logs if available.
      render: shell
