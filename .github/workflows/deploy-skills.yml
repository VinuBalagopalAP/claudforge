# .github/workflows/deploy-skills.yml
name: Deploy Claude Skills

on:
  push:
    branches: [ main ]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install .
          playwright install chrome

      - name: Deploy Skills
        run: |
          # Note: Headless mode is required for CI
          # Ensure you have handled authentication if necessary (session storage/cookies)
          claudforge upload --batch ./skills/ --headless
